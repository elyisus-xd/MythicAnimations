name: MythicAnimations
version: '${version}'

main: com.elyisusxd.mythicanims.MythicAnimations
paperPluginLoader: com.elyisusxd.mythicanims.MythicAnimationsLoader
api-version: '1.21.1'
load: POSTWORLD

authors: [elyisusxd]
depend: [MythicMobs]
softdepend: [Animorph, PlaceholderAPI]
commands:
  morphpoints:
    description: Administra puntos de progresión
    permission: mythicanims.admin
    usage: /<command> <give|set|get|reset> <jugador> [cantidad]
  skills:
    description: Abre el árbol de habilidades
permissions:
  mythicanims.admin:
    description: Acceso admin completo (comandos de puntos, etc.)
    default: op